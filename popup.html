<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超星助手</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="plugin-title">Fk-Chaoxing <span class="version">v1.2.3</span></h1>
      </div>
      <div class="header-right">
        <button class="btn-icon" id="btn-refresh" title="重载插件" style="margin-right: 4px;">
          <i class="ri-refresh-line"></i>
        </button>
        <label class="switch" title="临时关闭/开启插件">
          <input type="checkbox" id="plugin-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </header>

    <!-- Current Page Info -->
    <section class="page-info">
      <img id="page-favicon" src="icons/chaoxing.png" alt="icon" class="favicon">
      <div class="page-details">
        <div id="page-title" class="page-title">检测中...</div>
        <div id="page-url" class="page-url">--</div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- Extractors -->
    <section class="section">
      <h2 class="section-title">提取题目</h2>
      <button class="btn btn-outline" id="btn-extract-auto" title="自动识别页面类型并提取题目">
        <i class="ri-clipboard-line"></i> 自动提取本页题目
      </button>
    </section>

    <!-- AI Answer -->
    <section class="section">
      <div class="section-header-row">
        <h2 class="section-title">辅助</h2>
        <button class="btn-text" id="btn-ai-config-open" type="button" title="AI 模型配置">
          <i class="ri-settings-3-line"></i> 配置
        </button>
      </div>
      <button class="btn btn-primary" id="btn-ai-answer">
        <img id="btn-ai-icon" src="" style="width: 14px; height: 14px; border-radius: 2px; display: none;" />
        <i class="ri-openai-fill" id="btn-ai-icon-default"></i>
        <span id="btn-ai-text">AI 答题</span>
      </button>
    </section>

    <div class="divider"></div>

    <!-- Logs -->
    <section class="section log-section">
      <div class="log-header">
        <h2 class="section-title">运行日志</h2>
        <button id="btn-clear-log" class="btn-text">清空</button>
      </div>
      <div id="log-content" class="log-content">
        <div class="log-item info">
          <span class="log-msg">等待操作...</span>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <a href="https://github.com/iPycc/Fk-Chaoxing-Extension" target="_blank" class="link">
        <i class="ri-github-fill"></i> GitHub
      </a>
      <a href="https://scriptcat.org/zh-CN/script-show-page/4386" target="_blank" class="link">
        ScriptCat
      </a>
    </footer>

  </div>

  <!-- AI Config Modal -->
  <div id="ai-config-modal" class="modal-overlay" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">AI 模型配置</h2>
        <button class="btn-icon" id="btn-ai-config-close" type="button">
          <i class="ri-close-line"></i>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="ai-profile-select">当前模型</label>
          <div class="inline-row">
            <select id="ai-profile-select" class="form-control"></select>
            <button class="btn btn-outline btn-compact" id="btn-ai-profile-new" type="button">添加</button>
          </div>
        </div>

        <div class="form-group">
          <label for="ai-profile-name">显示名称</label>
          <input id="ai-profile-name" class="form-control" type="text" placeholder="如：OpenAI / Kimi / 本地模型">
        </div>

        <div class="form-group">
          <label for="ai-base-url">API 地址</label>
          <input id="ai-base-url" class="form-control" type="url" placeholder="">
        </div>

        <div class="form-group">
          <label for="ai-api-key">API 密钥</label>
          <input id="ai-api-key" class="form-control" type="password" placeholder="sk-...">
        </div>

        <div class="form-group">
          <label for="ai-model-id">模型 ID</label>
          <input id="ai-model-id" class="form-control" type="text" placeholder="model-id">
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="ai-api-path">接口路径</label>
            <input id="ai-api-path" class="form-control" type="text" placeholder="/chat/completions">
          </div>
          <div class="form-group">
            <label for="ai-temperature">温度</label>
            <input id="ai-temperature" class="form-control" type="number" min="0" max="2" step="0.1" placeholder="0.3">
          </div>
        </div>

        <p class="form-help">配置保存在本地。不要把真实 API Key 截图公开。</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline btn-danger" id="btn-ai-config-delete" type="button">删除</button>
        <button class="btn btn-primary" id="btn-ai-config-save" type="button">保存配置</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
