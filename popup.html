<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超星助手</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1 class="plugin-title">Fk-Chaoxing <span class="version">v1.2.2</span></h1>
      </div>
      <div class="header-right">
        <label class="switch" title="临时关闭/开启插件">
          <input type="checkbox" id="plugin-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </header>

    <!-- Current Page Info -->
    <section class="page-info">
      <img id="page-favicon" src="icons/chaoxing.png" alt="icon" class="favicon">
      <div class="page-details">
        <div id="page-title" class="page-title">检测中...</div>
        <div id="page-url" class="page-url">--</div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- Extractors -->
    <section class="section">
      <h2 class="section-title">提取题目</h2>
      <button class="btn btn-outline" id="btn-extract-auto" title="自动识别页面类型并提取题目">
        <i class="ri-clipboard-line"></i> 自动提取本页题目
      </button>
    </section>

    <!-- AI Answer -->
    <section class="section">
      <h2 class="section-title">辅助</h2>
      <button class="btn btn-primary" id="btn-ai-answer">
        <i class="ri-openai-fill"></i> AI 答题
      </button>
    </section>

    <!-- AI Config -->
    <section class="section ai-config-section">
      <div class="section-header-row">
        <h2 class="section-title">AI 模型配置</h2>
        <button class="btn-text" id="btn-ai-config-toggle" type="button">展开</button>
      </div>
      <div id="ai-config-panel" class="ai-config-panel" hidden>
        <div class="form-group">
          <label for="ai-profile-select">当前模型</label>
          <div class="inline-row">
            <select id="ai-profile-select" class="form-control"></select>
            <button class="btn btn-outline btn-compact" id="btn-ai-profile-new" type="button">添加</button>
          </div>
        </div>

        <div class="form-group">
          <label for="ai-profile-name">显示名称</label>
          <input id="ai-profile-name" class="form-control" type="text" placeholder="如：OpenAI / Kimi / 本地模型">
        </div>

        <div class="form-group">
          <label for="ai-base-url">API 地址</label>
          <input id="ai-base-url" class="form-control" type="url" placeholder="https://api.openai.com/v1">
        </div>

        <div class="form-group">
          <label for="ai-api-key">API 密钥</label>
          <input id="ai-api-key" class="form-control" type="password" placeholder="sk-...">
        </div>

        <div class="form-group">
          <label for="ai-model-id">模型 ID</label>
          <input id="ai-model-id" class="form-control" type="text" placeholder="gpt-4o-mini / kimi-k2 / your-model-id">
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="ai-api-path">接口路径</label>
            <input id="ai-api-path" class="form-control" type="text" value="/chat/completions">
          </div>
          <div class="form-group">
            <label for="ai-temperature">温度</label>
            <input id="ai-temperature" class="form-control" type="number" min="0" max="2" step="0.1" value="0.3">
          </div>
          <div class="form-group">
            <label for="ai-max-tokens">最大 Tokens</label>
            <input id="ai-max-tokens" class="form-control" type="number" min="1" step="1" value="2000">
          </div>
        </div>

        <p class="form-help">配置会保存到浏览器本地存储。不要把真实 API Key 写入仓库中的 .env 或截图公开。</p>

        <div class="config-actions">
          <button class="btn btn-primary" id="btn-ai-config-save" type="button">保存配置</button>
          <button class="btn btn-outline" id="btn-ai-config-delete" type="button">删除</button>
        </div>
      </div>
    </section>

    <div class="divider"></div>

    <!-- Logs -->
    <section class="section log-section">
      <div class="log-header">
        <h2 class="section-title">运行日志</h2>
        <button id="btn-clear-log" class="btn-text">清空</button>
      </div>
      <div id="log-content" class="log-content">
        <div class="log-item info">
          <span class="log-msg">等待操作...</span>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <a href="https://github.com/iPycc/Fk-Chaoxing-Extension" target="_blank" class="link">
        <i class="ri-github-fill"></i> GitHub
      </a>
      <a href="https://scriptcat.org/zh-CN/script-show-page/4386" target="_blank" class="link">
        ScriptCat
      </a>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
